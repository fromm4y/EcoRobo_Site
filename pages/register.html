<div class="register-container">

    <div class="register-card fade">

        <!-- Logo -->

        <img
            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%232F6B4F'/%3E%3Cpath d='M50 24c-14 6-22 18-22 32a22 22 0 0044 0c0-14-8-26-22-32z' fill='%23B7E4C7'/%3E%3C/svg%3E"
            class="logo"
            alt="EcoRobo">

        <h1>EcoRobo</h1>

        <p class="subtitle">

            Crie sua conta e comece a reciclar com inteligência.

        </p>

        <!-- Form -->

        <form id="registerForm">

            <!-- Nome -->

            <div class="input-group">

                <label>Nome completo</label>

                <input

                    id="name"

                    class="input"

                    type="text"

                    placeholder="Digite seu nome completo"

                    required>

            </div>

            <!-- Email -->

            <div class="input-group">

                <label>E-mail</label>

                <input

                    id="email"

                    class="input"

                    type="email"

                    placeholder="Digite seu email"

                    required>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Senha</label>

                <div class="password-wrapper">

                    <input

                        id="password"

                        class="input"

                        type="password"

                        placeholder="Crie uma senha"

                        required>

                    <button

                        id="togglePassword"

                        type="button"

                        class="eye-button">

                        👁

                    </button>

                </div>

            </div>

            <!-- Confirmar Password -->

            <div class="input-group">

                <label>Confirmar senha</label>

                <div class="password-wrapper">

                    <input

                        id="confirmPassword"

                        class="input"

                        type="password"

                        placeholder="Digite a senha novamente"

                        required>

                    <button

                        id="toggleConfirmPassword"

                        type="button"

                        class="eye-button">

                        👁

                    </button>

                </div>

            </div>

            <button

                class="btn-primary register-button"

                type="submit">

                Criar Conta

            </button>

        </form>

        <p class="login-text">

            Já tem conta?

            <a href="#" id="goToLogin">

                Entrar

            </a>

        </p>

    </div>

</div>
