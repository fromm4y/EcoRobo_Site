<div class="login-container">

    <div class="login-card fade">

        <!-- Logo -->

        <img
            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%232F6B4F'/%3E%3Cpath d='M50 24c-14 6-22 18-22 32a22 22 0 0044 0c0-14-8-26-22-32z' fill='%23B7E4C7'/%3E%3C/svg%3E"
            class="logo"
            alt="EcoRobo">

        <h1>EcoRobo</h1>

        <p class="subtitle">

            Aprenda. Escaneie. Proteja o Planeta.

        </p>

        <!-- Form -->

        <form id="loginForm">

            <!-- Email -->

            <div class="input-group">

                <label>E-mail</label>

                <input

                    id="email"

                    class="input"

                    type="email"

                    placeholder="Digite seu email"

                    required>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Senha</label>

                <div class="password-wrapper">

                    <input

                        id="password"

                        class="input"

                        type="password"

                        placeholder="Digite sua senha"

                        required>

                    <button

                        id="togglePassword"

                        type="button"

                        class="eye-button">

                        👁

                    </button>

                </div>

            </div>

            <a

                href="#"

                class="forgot-password">

                Esqueceu a senha?

            </a>

            <button

                class="btn-primary login-button"

                type="submit">

                Entrar

            </button>

        </form>

        <div class="divider">

            <span>OU</span>

        </div>

        <button

            id="googleLogin"

            class="google-button">

            Continuar com o Google

        </button>

        <p class="register-text">

            Não tem uma conta?

            <a href="#" id="goToRegister">

                Criar uma conta

            </a>

        </p>

    </div>

</div>
