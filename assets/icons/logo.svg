<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4C956C"/>
      <stop offset="100%" stop-color="#2F6B4F"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B7E4C7"/>
      <stop offset="100%" stop-color="#43AA8B"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect x="8" y="8" width="496" height="496" rx="124" fill="url(#bg)"/>

  <!-- Antena reta (lado direito) -->
  <line x1="300" y1="140" x2="300" y2="96" stroke="#F6F8F5" stroke-width="10" stroke-linecap="round"/>
  <circle cx="300" cy="88" r="12" fill="#F6F8F5"/>

  <!-- Antena-folha (lado esquerdo, o elemento assinatura) -->
  <path d="M212 140 C 200 108, 168 84, 132 82 C 140 118, 168 146, 204 148 Z"
        fill="url(#leaf)"/>
  <line x1="212" y1="140" x2="204" y2="122" stroke="#2F6B4F" stroke-width="4" stroke-linecap="round"/>

  <!-- Cabeça do robô -->
  <rect x="146" y="140" width="220" height="180" rx="46" fill="#F6F8F5"/>

  <!-- Olhos -->
  <circle cx="212" cy="222" r="22" fill="#2F6B4F"/>
  <circle cx="300" cy="222" r="22" fill="#2F6B4F"/>
  <circle cx="219" cy="215" r="6" fill="#F6F8F5"/>
  <circle cx="307" cy="215" r="6" fill="#F6F8F5"/>

  <!-- Sorriso -->
  <path d="M198 268 Q 256 300, 314 268" stroke="#2F6B4F" stroke-width="10"
        stroke-linecap="round" fill="none"/>

  <!-- Base / pescoço -->
  <rect x="230" y="316" width="52" height="26" rx="10" fill="#F6F8F5"/>
</svg>
