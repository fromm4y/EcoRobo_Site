<!-- ==========================================================
     EcoRobo
     Navbar Superior
========================================================== -->

<header class="navbar">

    <div class="navbar-left">

        <button

            id="navbarBackButton"

            class="back-button hidden"

            type="button"

            title="Voltar"

            aria-label="Voltar">

            ←

        </button>

        <div class="user-menu-wrapper">

            <button

                id="navbarLogoButton"

                class="logo-button"

                type="button"

                title="Menu"

                aria-label="Abrir menu">

                <img

                    src="assets/icons/logo.png"

                    alt="EcoRobo"

                    class="navbar-logo">

            </button>

            <div id="userMenu" class="user-menu hidden">

                <button id="userMenuProfile" class="user-menu-item" type="button">

                    👤 Perfil

                </button>

                <button id="userMenuLogout" class="user-menu-item" type="button">

                    🚪 Sair

                </button>

            </div>

        </div>

        <div>

            <h2>

                EcoRobo

            </h2>

            <span>

                Inteligência para reciclar

            </span>

        </div>

    </div>

    <div class="navbar-right">

        <button

            id="notificationButton"

            class="icon-button"

            title="Notificações">

            🔔

        </button>

        <button

            id="navbarAvatarButton"

            class="navbar-avatar-button"

            type="button"

            title="Meu perfil"

            aria-label="Ir pro perfil">

            <img

                id="navbarAvatar"

                src="assets/images/default-avatar.png"

                alt="Perfil"

                class="navbar-avatar skeleton">

        </button>

    </div>

</header>
